<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ffd6e7;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.header{
background:#ff5ca8;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

#status{
font-size:12px;
}

/* MESSAGES AREA */

#messages{
flex:1;
overflow-y:auto;
padding:15px;
}

/* MESSAGE BUBBLES */

.msg{
max-width:70%;
padding:10px;
margin:10px 0;
border-radius:10px;
word-wrap:break-word;
}

.myMsg{
background:#ff8fc2;
margin-left:auto;
text-align:right;
}

.friendMsg{
background:white;
margin-right:auto;
}

.time{
font-size:11px;
margin-top:5px;
color:#444;
}

/* INPUT AREA */

.inputArea{
display:flex;
padding:10px;
background:#ffc6dd;
}

#message{
flex:1;
padding:10px;
border-radius:20px;
border:none;
outline:none;
}

button{
margin-left:5px;
border:none;
border-radius:20px;
padding:10px 15px;
background:#ff5ca8;
color:white;
font-weight:bold;
}

/* IMAGE */

.chatImage{
max-width:200px;
border-radius:10px;
margin-top:5px;
}

</style>

</head>

<body>

<div class="header">

<div id="roomTitle">Chat</div>
<div id="status">online</div>

</div>

<div id="messages"></div>

<div class="inputArea">

<input id="message" placeholder="Type message">

<input type="file" id="imageInput" accept="image/*" style="display:none">

<button onclick="openImage()">📷</button>

<button onclick="sendMessage()">Send</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="chat.js"></script>

</body>
</html>
